name: Auto-Tag Versions

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "package.json"

jobs:
  tag-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get Current Version
        id: current
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get Previous Version
        id: previous
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git show HEAD^:package.json > previous-package.json || touch previous-package.json
            PREV_VERSION=$(jq -r '.version // empty' previous-package.json)
          else
            PREV_VERSION=""
          fi
          echo "version=$PREV_VERSION" >> $GITHUB_OUTPUT

      - name: Check if Version Changed
        id: changed
        run: |
          if [ "${{ steps.current.outputs.version }}" != "${{ steps.previous.outputs.version }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Tag
        if: steps.changed.outputs.changed == 'true'
        run: |
          TAG="v${{ steps.current.outputs.version }}"
          echo "Tagging commit with $TAG"

          # Prevent duplicate tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            exit 0
          fi

          git tag "$TAG"
          git push origin "$TAG"