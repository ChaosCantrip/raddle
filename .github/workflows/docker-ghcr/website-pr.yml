name: Build "raddle-website" For Validation

on:
  pull_request:
    paths:
      - "apps/website/**"
      - "packages/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: raddle-website

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/website/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max